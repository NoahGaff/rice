$font = OpenDyslexicM Nerd Font Mono

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 4, linear
    animation = fadeOut, 1, 4, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.95
    brightness = 0.82
    vibrancy = 0.20
    vibrancy_darkness = 0.15
    color = rgba(24, 24, 37, 1.0)
}

label {
    monitor =
    text = $TIME12
    color = rgba(245, 194, 231, 1.0)
    font_size = 72
    font_family = $font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A • %B %d"
    color = rgba(180, 190, 254, 1.0)
    font_size = 22
    font_family = $font
    position = 0, 55
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 58
    outline_thickness = 3
    dots_size = 0.22
    dots_spacing = 0.28
    dots_center = true
    fade_on_empty = false
    hide_input = false
    rounding = 18

    outer_color = rgba(203, 166, 247, 1.0)
    inner_color = rgba(30, 30, 46, 0.92)
    font_color = rgba(205, 214, 244, 1.0)
    check_color = rgba(166, 227, 161, 1.0)
    fail_color = rgba(245, 194, 231, 1.0)

    placeholder_text = <span foreground="##b4befe">Password...</span>
    fail_text = <span foreground="##f38ba8">$FAIL</span>
    capslock_color = rgba(250, 179, 135, 1.0)

    font_family = $font
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgba(137, 180, 250, 1.0)
    font_size = 18
    font_family = $font
    position = 0, -95
    halign = center
    valign = center
}
